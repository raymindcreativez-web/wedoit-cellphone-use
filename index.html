<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT RAI - Phone Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-view {
            animation: fadeIn 0.4s ease-out forwards;
        }
        /* Custom scrollbar for the logs area */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Data derived from image_1b3aeb.png and image_1ba483.png
        const SCHOOL_DATA = {
            "Grade 7": [
                { name: "SSC7", adviser: "Emie Joy L. Fabellore" },
                { name: "Amethyst", adviser: "Emili Jun M. Galario" },
                { name: "Diamond", adviser: "Estephanie F. Morada" },
                { name: "Gold", adviser: "Mary Grace M. Ylagan" }
            ],
            "Grade 8": [
                { name: "Faraday", adviser: "Clarise F. Panoy" },
                { name: "Einstein", adviser: "Jesibel F. Trogon" },
                { name: "Newton", adviser: "Lea T. Gregorio" },
                { name: "SSC8", adviser: "Veryl F. Fajarillo" }
            ],
            "Grade 9": [
                { name: "SSC9", adviser: "Edgie F. Servanez" },
                { name: "Homer", adviser: "Faith F. Mangoba" },
                { name: "Shakespeare", adviser: "Geraldine C. Pampo" },
                { name: "Rizal", adviser: "Rio G. Cortez" }
            ],
            "Grade 10": [
                { name: "Uranus", adviser: "Christian Jay V. Gaa" },
                { name: "SSC", adviser: "Elranie C. Faigao" },
                { name: "Jupiter", adviser: "Helen Rose M. Anastacio" },
                { name: "Neptune", adviser: "Katherine G. Taborete" }
            ]
        };

        // Icons as simple functional components
        const AlertIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
                <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
            </svg>
        );

        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const WelcomeScreen = ({ onEnter }) => {
            return (
                <div className="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex flex-col relative overflow-hidden">
                    {/* Ambient Background Shapes */}
                    <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-100 rounded-full blur-3xl opacity-60 mix-blend-multiply -z-10 animate-pulse"></div>
                    <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-100 rounded-full blur-3xl opacity-60 mix-blend-multiply -z-10 animate-pulse" style={{ animationDelay: '1s' }}></div>
                    <div className="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-blue-100 rounded-full blur-3xl opacity-60 mix-blend-multiply -z-10 animate-pulse" style={{ animationDelay: '2s' }}></div>

                    {/* Main Content */}
                    <main className="flex-grow flex items-center justify-center p-4 sm:p-6">
                        <div className="bg-white/80 backdrop-blur-xl border border-slate-200 shadow-2xl rounded-3xl p-8 sm:p-12 max-w-lg w-full text-center transform transition-all hover:scale-[1.01] duration-500 fade-in-view">
                            
                            {/* Logo / Icon */}
                            <div className="mx-auto w-20 h-20 bg-brand-600 rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-brand-500/30 rotate-3 hover:rotate-0 transition-transform duration-300">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>

                            {/* Titles */}
                            <div className="mb-2">
                                <span className="text-xs font-bold tracking-widest uppercase text-brand-600 bg-brand-50 px-3 py-1 rounded-full border border-brand-100">Project RAI</span>
                            </div>
                            <h1 className="text-4xl sm:text-5xl font-extrabold text-slate-900 tracking-tight mb-4">
                                RAI Focus
                            </h1>
                            
                            {/* Description */}
                            <p className="text-slate-600 text-base sm:text-lg mb-10 leading-relaxed">
                                A streamlined tool designed for educators to quickly log and manage phone policy violations. Maintain a distraction-free environment and ensure uninterrupted instruction.
                            </p>

                            {/* Action Button */}
                            <button onClick={onEnter} className="inline-flex items-center justify-center w-full sm:w-auto px-8 py-4 text-lg font-bold text-white bg-brand-600 rounded-full hover:bg-brand-700 shadow-lg hover:shadow-brand-500/50 transition-all active:scale-95 group">
                                Open Tracker
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 ml-2 transform group-hover:translate-x-1 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                                    <path fillRule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clipRule="evenodd" />
                                </svg>
                            </button>

                            {/* Subtext */}
                            <p className="mt-6 text-xs text-slate-400 font-medium flex items-center justify-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-green-500" viewBox="0 0 20 20" fill="currentColor">
                                    <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                                </svg>
                                Syncs automatically with Google Sheets
                            </p>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="w-full py-6 text-center z-10 relative">
                        <p className="text-sm text-slate-500 font-medium">
                            &copy;2016-2026 wedoIT&trade;Solutions
                        </p>
                        <p className="text-xs mt-1 text-slate-400 font-medium tracking-wide">
                            Developed by Sirmon&trade;
                        </p>
                    </footer>
                </div>
            );
        };

        function App() {
            // View State
            const [currentView, setCurrentView] = useState('welcome');

            // State for the form
            const [studentName, setStudentName] = useState('');
            const [selectedGrade, setSelectedGrade] = useState('');
            const [selectedSection, setSelectedSection] = useState('');
            const [currentAdviser, setCurrentAdviser] = useState(''); // New state for adviser
            const [notes, setNotes] = useState('');
            
            // State for submission status
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState({ type: '', message: '' });
            
            // State for logs
            const [logs, setLogs] = useState([]);

            // Ref for auto-focusing the first input field
            const nameInputRef = useRef(null);

            // ==========================================
            // IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
            // ==========================================
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxadSZUoa6e2MRyLF87PiAQwAdRfMT-jtx09OkoUxAuGNegqWLihNK3K2DTBbmDB7Xyhg/exec'; 
            // Handle Grade Change (Reset section and adviser when grade changes)
            const handleGradeChange = (e) => {
                setSelectedGrade(e.target.value);
                setSelectedSection(''); 
                setCurrentAdviser(''); 
            };

            // Handle Section Change
            const handleSectionChange = (e) => {
                const sectionName = e.target.value;
                setSelectedSection(sectionName);
                
                // Find the adviser for this specific section within the selected grade
                if (selectedGrade && sectionName) {
                    const sectionObj = SCHOOL_DATA[selectedGrade].find(s => s.name === sectionName);
                    if (sectionObj) {
                        setCurrentAdviser(sectionObj.adviser);
                    } else {
                        setCurrentAdviser('');
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!studentName.trim() || !selectedGrade || !selectedSection) {
                    setSubmitStatus({ type: 'error', message: 'Please fill in all required fields.' });
                    return; 
                }

                setIsSubmitting(true);
                setSubmitStatus({ type: '', message: '' });

                const newLog = {
                    id: Date.now().toString(),
                    studentName: studentName.trim(),
                    grade: selectedGrade,
                    section: selectedSection,
                    adviser: currentAdviser, // Added adviser to the payload
                    notes: notes.trim(),
                    timestamp: new Date().toISOString()
                };

                try {
                    // 1. Try sending to Google Sheets via the Apps Script Web App
                    if (GOOGLE_SCRIPT_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                        const response = await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors', // Required when calling Apps Script from browser
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(newLog),
                        });
                        
                        // Because of 'no-cors', we can't read the exact response status easily,
                        // but if fetch doesn't throw a network error, we assume it reached Google.
                        console.log("Data sent to Google Sheets (no-cors mode).");
                    } else {
                        console.warn("Google Script URL not configured. Data saved locally only.");
                    }

                    // 2. Update local state and UI
                    setLogs([newLog, ...logs]);
                    
                    // Reset form
                    setStudentName('');
                    setSelectedGrade('');
                    setSelectedSection('');
                    setCurrentAdviser(''); // Reset adviser
                    setNotes('');
                    
                    setSubmitStatus({ type: 'success', message: 'Incident recorded successfully!' });
                    
                    // Focus back on the name input for rapid data entry
                    if (nameInputRef.current) {
                        nameInputRef.current.focus();
                    }
                    
                    // Clear success message after 3 seconds
                    setTimeout(() => setSubmitStatus({ type: '', message: '' }), 3000);

                } catch (error) {
                    console.error("Error submitting data:", error);
                    setSubmitStatus({ type: 'error', message: 'Failed to record incident. Check network connection.' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleDelete = (idToRemove) => {
                setLogs(logs.filter(log => log.id !== idToRemove));
            };

            // Format date for display
            const formatDate = (isoString) => {
                const date = new Date(isoString);
                return date.toLocaleString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    hour: 'numeric', 
                    minute: '2-digit',
                    hour12: true 
                });
            };

            if (currentView === 'welcome') {
                return <WelcomeScreen onEnter={() => setCurrentView('tracker')} />;
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 text-slate-800 fade-in-view">
                    
                    {/* Header */}
                    <header className="bg-slate-900 text-white shadow-md py-6 px-4">
                        <div className="max-w-7xl mx-auto text-center md:text-left flex flex-col md:flex-row justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight">PROJECT RAI</h1>
                                <p className="text-slate-400 text-sm font-medium tracking-widest uppercase mt-1">
                                    Rapid Advancement in Instruction
                                </p>
                            </div>
                            <div className="mt-4 md:mt-0 text-slate-300 font-semibold bg-slate-800 px-4 py-2 rounded-full border border-slate-700 shadow-inner">
                                Phone Policy Tracker
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-grow w-full max-w-7xl mx-auto p-4 sm:p-6 lg:py-8 grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8 transition-all duration-300">
                        
                        {/* Left Column: Form */}
                        <div className="lg:col-span-5 h-fit">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6 lg:p-8">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="bg-red-100 p-2 rounded-full">
                                        <AlertIcon />
                                    </div>
                                    <h2 className="text-xl font-bold text-slate-800">Log Violation</h2>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    {/* Student Name */}
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1" htmlFor="studentName">
                                            Student Full Name <span className="text-red-500">*</span>
                                        </label>
                                        <input 
                                            type="text" 
                                            id="studentName"
                                            ref={nameInputRef}
                                            value={studentName}
                                            onChange={(e) => setStudentName(e.target.value)}
                                            className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-slate-50 focus:bg-white outline-none"
                                            placeholder="e.g., Juan Dela Cruz"
                                            required
                                        />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {/* Grade Dropdown */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1" htmlFor="grade">
                                                Grade Level <span className="text-red-500">*</span>
                                            </label>
                                            <select 
                                                id="grade"
                                                value={selectedGrade}
                                                onChange={handleGradeChange}
                                                className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-slate-50 focus:bg-white outline-none cursor-pointer"
                                                required
                                            >
                                                <option value="" disabled>Select Grade...</option>
                                                {Object.keys(SCHOOL_DATA).map(grade => (
                                                    <option key={grade} value={grade}>{grade}</option>
                                                ))}
                                            </select>
                                        </div>

                                        {/* Section Dropdown (Cascading) */}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1" htmlFor="section">
                                                Section <span className="text-red-500">*</span>
                                            </label>
                                            <select 
                                                id="section"
                                                value={selectedSection}
                                                onChange={handleSectionChange} // Updated handler
                                                className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-slate-50 focus:bg-white outline-none cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                                                required
                                                disabled={!selectedGrade}
                                            >
                                                <option value="" disabled>
                                                    {selectedGrade ? "Select Section..." : "Select Grade First"}
                                                </option>
                                                {}
                                                {selectedGrade && SCHOOL_DATA[selectedGrade].map(section => (
                                                    <option key={section.name} value={section.name}>{section.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    {}
                                    {/* Adviser Display (Auto-populated) */}
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1" htmlFor="adviser">
                                            Adviser
                                        </label>
                                        <input 
                                            type="text" 
                                            id="adviser"
                                            value={currentAdviser}
                                            className="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-100 text-slate-600 font-medium cursor-not-allowed"
                                            placeholder="Auto-populated based on section..."
                                            readOnly
                                            disabled
                                        />
                                    </div>

                                    {/* Notes (Optional) */}
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1" htmlFor="notes">
                                            Additional Notes <span className="text-slate-400 font-normal">(Optional)</span>
                                        </label>
                                        <textarea 
                                            id="notes"
                                            value={notes}
                                            onChange={(e) => setNotes(e.target.value)}
                                            rows="2"
                                            className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-slate-50 focus:bg-white outline-none resize-none"
                                            placeholder="e.g., Confiscated phone until the end of the day..."
                                        ></textarea>
                                    </div>

                                    {/* Status Messages */}
                                    {submitStatus.message && (
                                        <div className={`p-3 rounded-lg text-sm font-medium ${
                                            submitStatus.type === 'success' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'
                                        }`}>
                                            {submitStatus.message}
                                        </div>
                                    )}

                                    {/* Submit Button */}
                                    <button 
                                        type="submit"
                                        disabled={isSubmitting}
                                        className={`w-full text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all flex justify-center items-center gap-2
                                            ${isSubmitting 
                                                ? 'bg-slate-400 cursor-not-allowed' 
                                                : 'bg-red-600 hover:bg-red-700 hover:shadow-lg active:scale-[0.98]'
                                            }`}
                                    >
                                        {isSubmitting ? (
                                            <span className="flex items-center gap-2">
                                                <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                                Recording...
                                            </span>
                                        ) : 'Record Incident'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Right Column: Recent Logs */}
                        <div className="lg:col-span-7 flex flex-col h-full min-h-[500px] lg:max-h-[800px] mt-2 lg:mt-0">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6 lg:p-8 flex flex-col h-full">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-slate-800">Recent Logs</h2>
                                    <span className="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-full border border-slate-200">
                                        Total: {logs.length}
                                    </span>
                                </div>

                                <div className="flex-grow overflow-y-auto custom-scrollbar pr-2 space-y-4">
                                    {logs.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400 flex flex-col items-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12 mb-3 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                            </svg>
                                            <p>No incidents logged yet.</p>
                                        </div>
                                    ) : (
                                        logs.map((log) => (
                                            <div key={log.id} className="bg-slate-50 border border-slate-200 rounded-xl p-4 hover:shadow-md transition-shadow group relative">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <h3 className="font-bold text-slate-800 text-lg">{log.studentName}</h3>
                                                        <div className="flex items-center gap-2 text-sm text-indigo-600 font-semibold mt-1">
                                                            <span className="bg-indigo-100 px-2 py-0.5 rounded-md">{log.grade}</span>
                                                            <span>•</span>
                                                            <span className="bg-indigo-100 px-2 py-0.5 rounded-md">{log.section}</span>
                                                        </div>
                                                        {}
                                                        {log.adviser && (
                                                            <div className="text-sm text-slate-500 mt-1">
                                                                Adviser: <span className="font-medium text-slate-600">{log.adviser}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="text-right flex flex-col items-end">
                                                        <span className="text-xs font-medium text-slate-500 bg-slate-200 px-2 py-1 rounded">
                                                            {formatDate(log.timestamp)}
                                                        </span>
                                                        
                                                        {/* Delete Button - only shows on hover for cleaner UI */}
                                                        <button 
                                                            onClick={() => handleDelete(log.id)}
                                                            className="mt-2 text-slate-400 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"
                                                            title="Delete log"
                                                        >
                                                            <TrashIcon />
                                                        </button>
                                                    </div>
                                                </div>
                                                {log.notes && (
                                                    <p className="text-sm text-slate-600 mt-3 bg-white p-3 rounded-lg border border-slate-100">
                                                        <span className="font-semibold text-slate-700 block mb-1">Notes:</span>
                                                        {log.notes}
                                                    </p>
                                                )}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-slate-400 py-6 text-center mt-auto">
                        <p className="text-sm">
                            &copy;2016-2026 wedoIT&trade;Solutions
                        </p>
                        <p className="text-xs mt-1 text-slate-500">
                            Developed by Sirmon&trade;
                        </p>
